
docker:
    name: Docker Build & Push
    needs:
      - client-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
 Tar-name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Load for local scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile # CHANGE THIS if your Dockerfile lives in client/Dockerfile or server/Dockerfile
          load: true
          push: false
          tags: ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true

      - name: Run Trivy image scan (TABLE)
        run: |
          trivy image ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }} \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: source-sbom.spdx.json
          upload-artifact: true

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }}
          format: spdx-json
          output-file: image-sbom.spdx.json
          upload-artifact: true  
          

      - name: Push Image to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile # MUST match the file path specified in Step 1
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
