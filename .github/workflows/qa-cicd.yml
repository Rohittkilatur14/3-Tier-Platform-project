
docker:
    name: Docker Build & Push
    needs:
      - client-build
    runs-on: ubuntu-latest

    steps:
      # FIX 1: Add the missing checkout step so the runner can see your Dockerfile
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # FIX 2: Swapped hardcoded 'devopsshack' namespace out for your dynamic repository variable
      - name: Build
        uses: docker/build-push-action@v7
        with:
          load: true
          push: false
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:latest

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true

      - name: Verify Trivy installation
        run: |
          trivy --version
          which trivy

      - name: Run Trivy image scan (JSON)
        run: |
          trivy image ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }} \
            --format json \
            --output image-trivy-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Run Trivy image scan (TABLE)
        run: |
          trivy image ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }} \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 > image-trivy-report.txt

      - name: Upload Trivy image JSON report
        uses: actions/upload-artifact@v4
        with:
          name: image-trivy-json-report
          path: image-trivy-report.json
          if-no-files-found: warn

      - name: Upload Trivy image TABLE report
        uses: actions/upload-artifact@v4
        with:
          name: image-trivy-table-report
          path: image-trivy-report.txt
          if-no-files-found: warn

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: source-sbom.spdx.json
          upload-artifact: true

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }}
          format: spdx-json
          output-file: image-sbom.spdx.json
          upload-artifact: true  
          
      - name: Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:latest

  update-qa-manifest:
    name: Update QA Manifest
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout qa branch
        uses: actions/checkout@v4
        with:
          ref: qa
      # FIX 3: Update the sed pattern matching string to seek out your username namespace instead of devopsshack
      - name: Update image tag in manifest
        run: |
          sed -i "s|image: .*/nodejs-app:.*|image: ${{ vars.DOCKERHUB_USERNAME }}/nodejs-app:${GITHUB_SHA}|g" k8-manifests/qa/app-deployment.yaml
      - name: Show updated manifest (debug)
        run: |
          cat k8-manifests/qa/app-deployment.yaml
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8-manifests/qa/app-deployment.yaml
          git commit -m "Update QA image to ${GITHUB_SHA} [skip ci]" || echo "No changes to commit"
          git push origin qa
